<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | EDIT</title>
    <style>
        .bg-black{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body class="bg-black">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    // This function is work but its not optimize way as its tavares top to bottom.
    function addLanguage(langName){
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector(".language").appendChild(li)
    }

    addLanguage("Python")
    addLanguage("Rust")

    // Optimize way to add the data as first loading and integrations.

    function addOptiLanguage(langName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector(".language").appendChild(li)
    }

    addLanguage("C#")

    // EDIT data
    const secondLang = document.querySelector("li:nth-child(2)")
    // approach 1
    secondLang.innerHTML = "py"

    //approach 2: best practice.
    const newli = document.createElement('li')
    newli.textContent = "golang"
    secondLang.replaceWith(newli)

    // edit different way
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = "<li>Java</li>"

    //remove
    const langLang = document.querySelector("li:last-child")
    langLang.remove()
</script>
</html>
