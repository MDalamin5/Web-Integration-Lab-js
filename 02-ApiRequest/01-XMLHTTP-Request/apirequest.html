<!DOCTYPE html>
<html>
<head>
    <title>GitHub Profile</title>
</head>

<body style="background-color:#212121; color:white; text-align:center; font-family:Arial;">

    <h2>My GitHub Profile</h2>

    <!-- Image will be inserted here -->
    <img id="avatar" width="150" style="border-radius:50%; margin-top:20px;" />

    <!-- Followers count will be inserted here -->
    <h3 id="followers" style="margin-top:20px;"></h3>

</body>

<script>
    const requestUrl = 'https://api.github.com/users/mdalamin5'
    const xhr = new XMLHttpRequest()

    xhr.open('GET', requestUrl)

    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {

            const data = JSON.parse(xhr.responseText)

            // Set image
            document.getElementById('avatar').src = data.avatar_url

            // Set followers text
            document.getElementById('followers').innerText =
                "Followers: " + data.followers
        }
    }

    xhr.send()
</script>

</html>
